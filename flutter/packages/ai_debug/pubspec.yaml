name: ai_debug
description: Embedded MCP debug bridge for Flutter apps — log streaming + remote command execution for AI agents.
version: 0.1.0
publish_to: 'none'
repository: https://github.com/santoshakil/ai_debug
homepage: https://github.com/santoshakil/ai_debug
issue_tracker: https://github.com/santoshakil/ai_debug/issues

environment:
  sdk: '>=3.5.0 <4.0.0'
  flutter: '>=3.22.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  logging: ^1.3.0
  protobuf: ^6.0.0
  hooks: ^1.0.0
  code_assets: ^1.0.0
  native_toolchain_rust: ^1.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^6.1.0
  ffigen: ^20.1.1
  protoc_plugin: ^25.0.0

ffigen:
  name: AiDebugBindings
  description: Generated FFI bindings for ai_debug Rust crate.
  output: lib/src/generated/bindings.dart
  headers:
    entry-points:
      - ../../../rust/generated/ai_debug.h
    include-directives:
      - ../../../rust/generated/ai_debug.h
  ffi-native:
    asset-id: package:ai_debug/src/ai_debug.dart
  preamble: |
    // ignore_for_file: type=lint, unused_field, unused_element, non_constant_identifier_names

flutter:
